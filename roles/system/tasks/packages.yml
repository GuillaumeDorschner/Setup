# Macos
- block:
    - name: Check if Homebrew is installed
      shell: command -v brew
      register: homebrew_check
      ignore_errors: true
      changed_when: false

    - name: Install Homebrew (if missing)
      shell: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> ~/.zshrc
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
      args:
        creates: /home/linuxbrew/.linuxbrew/bin/brew
      when: homebrew_check.rc != 0

    - name: Update Homebrew
      homebrew:
        update_homebrew: yes

    - name: Upgrade Homebrew Packages
      homebrew:
        upgrade_all: yes
  when: ansible_os_family in ["Darwin"]

# Ubuntu
- block:
    - name: Update the apt package index
      ansible.builtin.apt:
        update_cache: yes

    - name: Upgrade all installed packages to their latest version
      ansible.builtin.apt:
        upgrade: dist

    - name: Remove unnecessary packages
      ansible.builtin.apt:
        autoremove: yes
  when: ansible_os_family == 'Debian'

# RedHat
- block:
    - name: Ensure dnf/yum package manager is up to date
      ansible.builtin.dnf:
        name: '*'
        state: latest
      when: ansible_pkg_mgr == "dnf"

    - name: Ensure yum package manager is up to date
      ansible.builtin.yum:
        name: '*'
        state: latest
      when: ansible_pkg_mgr == "yum"

    - name: Remove unnecessary packages
      ansible.builtin.package:
        name: '*'
        state: absent
        autoremove: yes
  when: ansible_os_family == 'RedHat'
