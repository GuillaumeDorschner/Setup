- name: Install Development Tools
  package:
    name:
      - rustup
      - python3
      - nodejs
      - nvm
      - pnpm
      - yarn
    state: present
  become: true

- name: Install npm global packages
  npm:
    name: '{{ item }}'
    global: yes
  loop:
    - pnpm
    - degit
    - nodemon
