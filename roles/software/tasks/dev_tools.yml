- name: Install Development Tools
  package:
    name: '{{ packages }}'
    state: present
  vars:
    packages: >
      {% if ansible_os_family == 'Darwin' %}
        ['python3', 'rustup', 'nvm']
      {% elif ansible_os_family == 'Debian' %}
        ['python3', 'rustc']
      {% elif ansible_os_family == 'RedHat' %}
        ['python3', 'rust'
      {% endif %}
  when: packages is defined

# Ubuntu & RedHat NVM
- block:
    - name: Install Node Version Manager
      command: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.38.0/install.sh | bash
      args:
        creates: '{{ ansible_env.HOME }}/.nvm'

    - name: Verifiy NVM installation
      command: nvm --version
      register: nvm_version
      failed_when: nvm_version.rc != 0
      changed_when: false

    - name: Verifiy Node
      command: node --version
      register: node_version
      failed_when: node_version.rc != 0
      changed_when: false

    - name: Install Node.js LTS
      command: nvm install --lts
      when: node_version.rc == 0

    - name: Use the LTS version of Node.js
      command: nvm use --lts
      when: node_version.rc == 0
  when: ansible_os_family in ['RedHat', 'Debian']

- name: Install npm global packages
  npm:
    name: '{{ item }}'
    global: yes
  loop:
    - pnpm
    - degit
    - nodemon
    - yarn
