- block:
    - name: Install Docker
      homebrew:
        name: docker
        state: present
  when: ansible_os_family == 'Darwin'

- block:
    - name: Install Docker
      apt:
        name: docker-ce
        state: present
    - name: Install Docker Compose
      apt:
        name: docker-compose
        state: present
  when: ansible_os_family == 'Debian'

- block:
    - name: Install Docker
      yum:
        name: docker
        state: present
    - name: Install Docker Compose
      yum:
        name: docker-compose
        state: present
  when: ansible_os_family == 'RedHat'
