- block:
    - name: Install Java
      homebrew:
        name: java
        state: present

    - name: Install PlantUML via Homebrew
      homebrew:
        name: plantuml
        state: present

    - name: Get PlantUML install path
      command: brew --prefix plantuml
      register: plantuml_path
      changed_when: false

  when: ansible_os_family == 'Darwin'
